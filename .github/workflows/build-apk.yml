name: Build STGB FC 26 .apk

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: npm install

      - name: Verify capacitor CLI installed
        run: npm ls @capacitor/cli

      - run: npx --yes --package=@capacitor/cli cap add android

      - run: npx --yes --package=@capacitor/cli cap sync android

      - run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: STGB-FC-26-Android
          path: android/app/build/outputs/apk/debug/*.apk
